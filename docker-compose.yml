services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      SAKAPUSS_APP_NAME: ${SAKAPUSS_APP_NAME:-sakapuss}
      SAKAPUSS_API_TITLE: ${SAKAPUSS_API_TITLE:-Sakapuss API}
      SAKAPUSS_DB_PATH: /app/data/sakapuss.db
      SAKAPUSS_MEDIA_PATH: /app/media
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
