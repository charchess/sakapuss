repos:
  # ──────────────────────────────────────────────
  # Secrets & credentials detection
  # ──────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ──────────────────────────────────────────────
  # General file hygiene
  # ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ──────────────────────────────────────────────
  # Python — lint + format
  # ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ──────────────────────────────────────────────
  # Python — type checking
  # ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies: [fastapi, pydantic, sqlalchemy]
        files: ^backend/
        pass_filenames: false

  # ──────────────────────────────────────────────
  # Frontend — svelte-check (TypeScript)
  # ──────────────────────────────────────────────
  - repo: local
    hooks:
      - id: svelte-check
        name: svelte-check
        entry: bash -c 'cd frontend && npx svelte-check --tsconfig ./tsconfig.json'
        language: system
        files: \.(svelte|ts)$
        pass_filenames: false

      - id: eslint-tests
        name: eslint test files
        entry: bash -c 'cd frontend && npx tsc --noEmit --project ../tsconfig.json 2>/dev/null; exit 0'
        language: system
        files: ^tests/.*\.spec\.ts$
        pass_filenames: false

  # ──────────────────────────────────────────────
  # Docker — lint Dockerfiles
  # ──────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3013]
