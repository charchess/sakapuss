name: Quality Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"
  SAKAPUSS_DB_PATH: ./data/test-ci.db
  SAKAPUSS_MEDIA_PATH: ./media

jobs:
  # ============================================================
  # Stage 1: Security Scan (secrets, vulnerabilities)
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks — detect secrets in code and git history
      - name: Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dependency audits (NFR12)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (critical)
        working-directory: frontend
        run: npm audit --audit-level=critical

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: pip audit (critical)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --severity critical

  # ============================================================
  # Stage 2: Lint & Type Check (fast feedback)
  # ============================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt ruff mypy
          cd frontend && npm ci

      # Python lint + format
      - name: Ruff lint
        run: ruff check backend/ --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/

      # Python type check
      - name: Mypy (Python types)
        run: mypy backend/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      # Frontend type check
      - name: Svelte check (TypeScript)
        working-directory: frontend
        run: npx svelte-check --tsconfig ./tsconfig.json

  # ============================================================
  # Stage 3: Backend Tests (pytest + coverage)
  # ============================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [security, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Run pytest with coverage
        run: |
          mkdir -p data media test-results
          python -m pytest backend/tests/ -v \
            --cov=backend \
            --cov-report=xml:coverage-backend.xml \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            --junitxml=test-results/backend-results.xml
        env:
          SAKAPUSS_DB_PATH: ${{ env.SAKAPUSS_DB_PATH }}
          SAKAPUSS_MEDIA_PATH: ${{ env.SAKAPUSS_MEDIA_PATH }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-results
          path: |
            test-results/backend-results.xml
            coverage-backend.xml
          retention-days: 7

  # ============================================================
  # Stage 3b: Mobile Tests (Jest — React Native)
  # ============================================================
  mobile-tests:
    name: Mobile Tests (Jest)
    runs-on: ubuntu-latest
    needs: [security, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Run Jest
        working-directory: mobile
        run: npx jest --ci --coverage --coverageReporters=lcov,text-summary
        env:
          CI: "true"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 7

  # ============================================================
  # Stage 4: API Tests (Playwright API project)
  # ============================================================
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [security, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          cd frontend && npm ci

      - name: Start backend
        run: |
          mkdir -p data media
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/ > /dev/null && break || sleep 2
          done
        env:
          SAKAPUSS_DB_PATH: ${{ env.SAKAPUSS_DB_PATH }}
          SAKAPUSS_MEDIA_PATH: ${{ env.SAKAPUSS_MEDIA_PATH }}

      - name: Run Playwright API tests
        working-directory: frontend
        run: |
          npx playwright test --project=api \
            --reporter=junit,html \
            --output=../test-results/api
        env:
          API_URL: http://localhost:8000
          CI: "true"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: |
            playwright-report/
            test-results/api/
          retention-days: 7

  # ============================================================
  # Stage 5: E2E Tests (Playwright — parallel matrix)
  # ============================================================
  e2e-tests:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [backend-tests, api-tests]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          cd frontend && npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start services
        run: |
          mkdir -p data media
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          cd frontend && npm run dev -- --port 5173 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/ > /dev/null && curl -sf http://localhost:5173 > /dev/null && break || sleep 2
          done
        env:
          SAKAPUSS_DB_PATH: ${{ env.SAKAPUSS_DB_PATH }}
          SAKAPUSS_MEDIA_PATH: ${{ env.SAKAPUSS_MEDIA_PATH }}

      - name: Run E2E tests (${{ matrix.project }})
        working-directory: frontend
        run: |
          npx playwright test --project=${{ matrix.project }} \
            --reporter=junit,html \
            --output=../test-results/e2e-${{ matrix.project }}
        env:
          API_URL: http://localhost:8000
          BASE_URL: http://localhost:5173
          CI: "true"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/e2e-${{ matrix.project }}/
          retention-days: 7

      # Capture traces + videos on failure
      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-traces-${{ matrix.project }}
          path: test-results/**/trace.zip
          retention-days: 14

  # ============================================================
  # Stage 6: Burn-In (flaky detection — PRs only)
  # ============================================================
  burn-in:
    name: Burn-In (5x)
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          cd frontend && npm ci
          cd frontend && npx playwright install --with-deps chromium

      - name: Start services
        run: |
          mkdir -p data media
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          cd frontend && npm run dev -- --port 5173 &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/ > /dev/null && curl -sf http://localhost:5173 > /dev/null && break || sleep 2
          done
        env:
          SAKAPUSS_DB_PATH: ${{ env.SAKAPUSS_DB_PATH }}
          SAKAPUSS_MEDIA_PATH: ${{ env.SAKAPUSS_MEDIA_PATH }}

      - name: Burn-in loop (5 iterations)
        working-directory: frontend
        run: |
          PASS=0
          FAIL=0
          for i in 1 2 3 4 5; do
            echo "::group::Burn-in iteration $i/5"
            rm -f "../$SAKAPUSS_DB_PATH"
            if npx playwright test --project=chromium --reporter=list 2>&1; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
            echo "::endgroup::"
          done
          echo ""
          echo "=== Burn-in: $PASS/5 passed, $FAIL/5 failed ==="
          if [ "$FAIL" -gt 0 ]; then
            echo "::warning::Flaky tests detected: $FAIL/5 iterations failed"
            exit 1
          fi
        env:
          API_URL: http://localhost:8000
          BASE_URL: http://localhost:5173
          CI: "true"
          SAKAPUSS_DB_PATH: ${{ env.SAKAPUSS_DB_PATH }}

  # ============================================================
  # Stage 7: Quality Gate (final decision)
  # ============================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [security, lint, backend-tests, api-tests, e2e-tests, mobile-tests]
    if: always()
    steps:
      - name: Evaluate gates
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║       QUALITY GATE — Sakapuss        ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ Security:  ${{ needs.security.result }}"
          echo "║ Lint:      ${{ needs.lint.result }}"
          echo "║ Backend:   ${{ needs.backend-tests.result }}"
          echo "║ API:       ${{ needs.api-tests.result }}"
          echo "║ E2E:       ${{ needs.e2e-tests.result }}"
          echo "║ Mobile:    ${{ needs.mobile-tests.result }}"
          echo "╚══════════════════════════════════════╝"
          echo ""

          FAILED=0

          # P0 — Security (secrets + dependency vulns)
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "::error::❌ SECURITY GATE FAILED — secrets or vulnerability detected"
            FAILED=1
          fi

          # P0 — Lint (code quality)
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::❌ LINT GATE FAILED — code quality issues"
            FAILED=1
          fi

          # P0 — Backend tests
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "::error::❌ BACKEND GATE FAILED — pytest failures"
            FAILED=1
          fi

          # P0 — API tests
          if [ "${{ needs.api-tests.result }}" != "success" ]; then
            echo "::error::❌ API GATE FAILED — API test failures"
            FAILED=1
          fi

          # P1 — E2E tests
          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "::error::❌ E2E GATE FAILED — E2E test failures"
            FAILED=1
          fi

          # P0 — Mobile tests
          if [ "${{ needs.mobile-tests.result }}" != "success" ]; then
            echo "::error::❌ MOBILE GATE FAILED — Jest test failures"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::🚫 QUALITY GATE BLOCKED — fix issues before merge"
            exit 1
          fi

          echo ""
          echo "✅ ALL GATES PASSED — safe to merge"
