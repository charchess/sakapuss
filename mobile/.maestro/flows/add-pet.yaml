appId: com.sakapuss.mobile
---
- launchApp:
    clearState: true
- assertVisible: "Se connecter"
- tapOn: "votre@email.com"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn: "••••••••"
- inputText: "PlaywrightTest123!"
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Navigate to AddPet via "+ Ajouter" link
- tapOn:
    text: "+ Ajouter"
- assertVisible: "Nouvel animal"

# Fill name, dismiss keyboard before scrolling further
- tapOn:
    id: "pet-name-input"
- inputText: "Caramel"
- hideKeyboard

# Pick species via pill (no keyboard interaction needed)
- tapOn: "Chat"

# Tap birth date input — scroll into view if needed
- scrollUntilVisible:
    element:
      id: "pet-birthdate-input"
    direction: DOWN
- tapOn:
    id: "pet-birthdate-input"
- inputText: "2022-06-15"
- hideKeyboard

# Submit
- tapOn: "Ajouter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"
