appId: com.sakapuss.mobile
---
- launchApp:
    clearState: true
- runFlow:
    file: ../helpers/connect-dev-client.yaml
# Dismiss Expo dev menu if it appears on launch (menu can appear 2-3s after launch)
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"
- tapOn:
    id: "email-input"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn:
    id: "password-input"
- inputText: "PlaywrightTest123!"
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Naviguer vers AddPet
- tapOn:
    text: "+ Ajouter"
- assertVisible: "Nouvel animal"

# Valider le formulaire vide → errorBox avec message de validation
- tapOn: "Ajouter"
- assertVisible: "Le nom est requis."

# Remplir le formulaire correctement
- tapOn:
    id: "pet-name-input"
- inputText: "Caramel"
- hideKeyboard

- tapOn:
    id: "species-pill-chat"

- scrollUntilVisible:
    element:
      id: "pet-birthdate-input"
    direction: DOWN
- tapOn:
    id: "pet-birthdate-input"
- tapOn: "OK"

# Soumettre
- scrollUntilVisible:
    element:
      text: "Ajouter"
    direction: DOWN
- tapOn: "Ajouter"

# Wizard d'onboarding — pets (save obligatoire) + modules (save obligatoire) + optionnels
- waitForAnimationToEnd
- assertVisible: "Vos animaux"
- assertNotVisible: "Passer cette étape"
# Existing pets visible, no draft to fill — just save
- tapOn:
    id: "onboarding-actions-save"
- waitForAnimationToEnd
- assertVisible: "Ce que vous voulez suivre"
- tapOn:
    id: "onboarding-actions-save"
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd

# Retour au dashboard sans erreur
- assertVisible: "Que se passe-t-il aujourd'hui ?"
- assertNotVisible: "Erreur"
- assertNotVisible: "Impossible"

# Vérifier que l'animal "Caramel" est visible dans la liste
- assertVisible: "Caramel"
