appId: com.sakapuss.mobile
---
# QuickLog gamelle: flux de validation (suppose des gamelles configurées)

- launchApp:
    clearState: true
- runFlow:
    file: ../helpers/connect-dev-client.yaml
# Dismiss Expo dev menu if it appears on launch (menu can appear 2-3s after launch)
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"
- tapOn:
    id: "email-input"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn:
    id: "password-input"
- inputText: "PlaywrightTest123!"
- hideKeyboard
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Tap sur Gamelle dans les Quick Actions
- tapOn:
    id: "quick-action-food"
- assertVisible: "Gamelle"

# Saisir une quantité si le champ est disponible
- tapOn:
    text: "ex: 80"
    optional: true
- inputText: "80"
- hideKeyboard

# Confirmer (bouton sticky, toujours visible)
- tapOn:
    id: "quicklog-submit-btn"

# Retour au dashboard sans erreur
- assertVisible: "Que se passe-t-il aujourd'hui ?"
- assertNotVisible: "Erreur"
