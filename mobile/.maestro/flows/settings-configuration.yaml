appId: com.sakapuss.mobile
---
# Paramètres: bandeau "Terminer la configuration" + reprise du wizard

- launchApp:
    clearState: true
- runFlow:
    file: ../helpers/connect-dev-client.yaml
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"
- tapOn:
    id: "email-input"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn:
    id: "password-input"
- inputText: "PlaywrightTest123!"
- hideKeyboard
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Ajouter un animal mais passer tout l'onboarding
- tapOn:
    text: "+ Ajouter"
- assertVisible: "Nouvel animal"
- tapOn:
    id: "pet-name-input"
- inputText: "Mochi"
- hideKeyboard
- tapOn:
    id: "species-pill-chien"
- scrollUntilVisible:
    element:
      id: "pet-birthdate-input"
    direction: DOWN
- tapOn:
    id: "pet-birthdate-input"
- tapOn: "OK"
- scrollUntilVisible:
    element:
      text: "Ajouter"
    direction: DOWN
- tapOn: "Ajouter"

# Wizard: étapes obligatoires (pets + modules) puis optionnelles
- assertVisible: "Vos animaux"
- assertNotVisible: "Passer cette étape"
- tapOn:
    id: "onboarding-actions-save"
- assertVisible: "Ce que vous voulez suivre"
- tapOn:
    id: "onboarding-actions-save"
- assertVisible: "Rappels santé"
- tapOn:
    id: "onboarding-actions-skip"
- assertVisible: "Poids initial"
- tapOn:
    id: "onboarding-actions-skip"
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- tapOn:
    id: "onboarding-actions-skip"
    optional: true

# Retour au dashboard
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Naviguer vers Paramètres — le bandeau "Terminer la configuration" doit être visible
- tapOn: "⚙️"
- assertVisible: "Paramètres"
- assertVisible:
    id: "parametres-setup-banner"

# Une ligne de configuration est présente
- assertVisible:
    id: "parametres-setup-row"

# Tapper une ligne → ouvre le wizard (fromSettings=true)
- tapOn:
    id: "parametres-setup-row"
- assertVisible: "Vos animaux"
- tapOn:
    id: "onboarding-actions-save"
- assertVisible: "Ce que vous voulez suivre"
- tapOn:
    id: "onboarding-actions-save"
- assertVisible: "Rappels santé"

# Compléter l'étape Santé depuis les paramètres
- tapOn:
    id: "onboarding-actions-save"

# Retour vers l'étape suivante puis goBack (fromSettings=true)
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- tapOn:
    id: "onboarding-actions-skip"
    optional: true

# Retour implicite vers Paramètres
- assertVisible: "Paramètres"
- assertNotVisible: "Erreur"
