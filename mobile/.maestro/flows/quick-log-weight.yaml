appId: com.sakapuss.mobile
---
# Pré-requis: utilisateur connecté avec au moins un animal
- launchApp
- tapOn: "⚖️"
- assertVisible: "Pesée"
- scrollUntilVisible:
    element:
      id: "quicklog-submit-btn"
    direction: DOWN

# Saisir sans poids → errorBox avec message de validation
- tapOn:
    id: "quicklog-submit-btn"
- assertVisible: "Veuillez saisir un poids valide."
- assertNotVisible: "Que se passe-t-il aujourd'hui ?"

# Saisir un poids valide
- tapOn:
    id: "weight-input"
- inputText: "4200"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "quicklog-submit-btn"
    direction: DOWN
- tapOn:
    id: "quicklog-submit-btn"

# Retour au dashboard sans erreur
- assertVisible: "Que se passe-t-il aujourd'hui ?"
- assertNotVisible: "Erreur"
- assertNotVisible: "Impossible"

# Vérifier que l'événement apparaît dans la Timeline
- tapOn: "📋"
- assertVisible: "Timeline"
- assertNotVisible: "Impossible de charger les données"
- tapOn:
    id: "filter-weight"
- assertNotVisible: "Impossible de charger les données"
- tapOn:
    id: "filter-all"
