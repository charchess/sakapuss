appId: com.sakapuss.mobile
---
# Mode local (sans compte): auth → onboarding gate → dashboard → fonctionnalités locales

- launchApp:
    clearState: true
- runFlow:
    file: ../helpers/connect-dev-client.yaml
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"

# Continuer sans compte → onboarding gate (0 animaux en local)
- tapOn:
    id: "guest-btn"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# === ÉTAPE 1 : Animaux (obligatoire, pas de "Passer") ===
- assertVisible: "Vos animaux"
- assertNotVisible: "Passer cette étape"
# Species d'abord, puis nom + Enter (submit via clavier)
- tapOn:
    id: "onboarding-species-chat"
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-pet-name"
- inputText: "Felix"
- pressKey: Enter
- waitForAnimationToEnd
- waitForAnimationToEnd

# === ÉTAPE 2 : Modules (bouton "Passer" disponible) ===
- assertVisible: "Ce que vous voulez suivre"
- tapOn:
    id: "onboarding-actions-skip"

# === Étapes optionnelles : passer ===
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "onboarding-actions-skip"
    optional: true
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Dashboard: animal "Felix" visible
- assertVisible: "Que se passe-t-il aujourd'hui ?"
- assertVisible: "Felix"

# Bannière mode guest visible
- assertVisible:
    id: "guest-banner"

# Quick Log poids
- tapOn:
    id: "quick-action-weight"
- assertVisible: "Pesée"
- tapOn:
    id: "weight-input"
- inputText: "4500"
- hideKeyboard
- tapOn:
    id: "quicklog-submit-btn"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Foyer: configurer une litière en mode local
- tapOn: "🏡"
- assertVisible: "Foyer"
- tapOn:
    id: "foyer-tile-litieres"
- tapOn:
    id: "resource-add-btn"
- tapOn:
    id: "resource-name-input"
- inputText: "Litiere locale"
- hideKeyboard
- tapOn:
    id: "resource-save-btn"
- assertVisible: "Litiere locale"

# Quick Log litière avec la ressource locale
- tapOn: "🏠"
- tapOn:
    id: "quick-action-litter"
- assertVisible: "Litière"
- assertVisible: "Litiere locale"
- tapOn:
    id: "quicklog-submit-btn"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Settings: bouton "Quitter le mode invité"
- tapOn: "⚙️"
- assertVisible: "Mode invité"
- scroll
- assertVisible: "Quitter le mode invité"
- assertNotVisible: "Se déconnecter"
- tapOn: "Quitter le mode invité"
- assertVisible: "Retourner à l'écran de connexion ?"
- tapOn: "Quitter"
- assertVisible: "Se connecter"
