appId: com.sakapuss.mobile
---
# Foyer: navigation et ajout de ressources

- launchApp:
    clearState: true
# Dismiss Expo dev menu if it appears on launch (menu can appear 2-3s after launch)
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"
- tapOn:
    id: "email-input"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn:
    id: "password-input"
- inputText: "PlaywrightTest123!"
- hideKeyboard
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Naviguer vers l'onglet Foyer
- tapOn: "🏡"
- assertVisible: "Foyer"
- assertNotVisible: "Erreur"

# === LITIÈRES ===
- tapOn:
    id: "foyer-tile-litieres"
- assertVisible: "Litières"

# Ajouter une litière
- tapOn:
    id: "resource-add-btn"
- assertVisible: "Nom de la litière"
- tapOn:
    id: "resource-name-input"
- inputText: "Litiere Test Maestro"
- hideKeyboard
- tapOn:
    id: "resource-save-btn"

# Vérifier que la liste est chargée sans erreur
- assertVisible: "Litières"
- assertNotVisible: "Erreur"

# Retour au Foyer
- tapOn: "Foyer"

# === GAMELLES ===
- tapOn:
    id: "foyer-tile-gamelles"
- assertVisible: "Gamelles"

# Ajouter une gamelle
- tapOn:
    id: "bowl-add-btn"
- assertVisible: "Nom"
- tapOn:
    id: "bowl-name-input"
- inputText: "Gamelle Test Maestro"
- tapOn:
    id: "bowl-location-input"
- inputText: "Cuisine"
- hideKeyboard
- tapOn:
    id: "bowl-save-btn"

# Vérifier que la gamelle est créée sans erreur
- assertVisible: "Gamelles"
- assertNotVisible: "Erreur"
