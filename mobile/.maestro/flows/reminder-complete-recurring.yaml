appId: com.sakapuss.mobile
---
# Test: compléter un rappel récurrent → le suivant apparaît automatiquement (date avancée)

- launchApp:
    clearState: true
- runFlow:
    file: ../helpers/connect-dev-client.yaml
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"
- tapOn:
    id: "email-input"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn:
    id: "password-input"
- inputText: "PlaywrightTest123!"
- hideKeyboard
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Créer un rappel via QuickLog médicament (nom sans mot-clé → 30j par défaut)
- tapOn:
    id: "quick-action-medicine"
- assertVisible: "Médic."

# Saisir le nom du médicament (pas de mot-clé auto-détecté)
- tapOn:
    id: "medicine-name-input"
- inputText: "MedRecurrentTest"
- hideKeyboard

# Activer le switch rappel manuellement
- scrollUntilVisible:
    element:
      id: "reminder-create-switch"
    direction: DOWN
- tapOn:
    id: "reminder-create-switch"
- waitForAnimationToEnd

# Soumettre
- tapOn:
    id: "quicklog-submit-btn"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Naviguer vers les rappels
- tapOn: "🔔"
- assertVisible: "Rappels"

# Défiler jusqu'au rappel MedRecurrentTest (30j → avant les Vermifuge Jul)
- scrollUntilVisible:
    element:
      id: "reminder-complete-medrecurrenttest"
    direction: DOWN

# Compléter le rappel via le bouton "✅ Fait"
- tapOn:
    id: "reminder-complete-medrecurrenttest"
- waitForAnimationToEnd

# Le rappel doit RESTER visible (récurrent → date avancée, pas supprimé)
- scrollUntilVisible:
    element:
      id: "reminder-delete-medrecurrenttest"
    direction: DOWN
- assertVisible: "MedRecurrentTest"
- assertVisible: "Rappels"

# Nettoyage : supprimer le rappel de test
- tapOn:
    id: "reminder-delete-medrecurrenttest"
- assertVisible: "Supprimer ce rappel"
- tapOn: "Supprimer"
