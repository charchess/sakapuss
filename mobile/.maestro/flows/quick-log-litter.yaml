appId: com.sakapuss.mobile
---
# QuickLog litière: état vide + flux avec ressource configurée

- launchApp:
    clearState: true
# Dismiss Expo dev menu if it appears on launch (menu can appear 2-3s after launch)
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"
- tapOn:
    id: "email-input"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn:
    id: "password-input"
- inputText: "PlaywrightTest123!"
- hideKeyboard
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Tap sur Litière dans les Quick Actions
- tapOn:
    id: "quick-action-litter"
- assertVisible: "Litière"

# Si aucune litière → affiche état vide avec bouton configurer
- tapOn:
    text: "Configurer les litières →"
    optional: true
- assertVisible:
    text: "Litières"
    optional: true
- tapOn:
    id: "resource-add-btn"
    optional: true
- tapOn:
    id: "resource-name-input"
    optional: true
- inputText: "Litiere Salon"
- hideKeyboard
- tapOn:
    id: "resource-save-btn"
    optional: true
- tapOn:
    text: "Accueil"
    optional: true

# Retenter le Quick Log litière (seulement si on a navigué ailleurs)
- tapOn:
    id: "quick-action-litter"
    optional: true
- assertVisible: "Litière"

# Sélectionner la note RAS (sélectionnée par défaut)
- assertVisible:
    text: "Quelle litière ?"
    optional: true
- tapOn:
    id: "litter-note-ras"
    optional: true

# Confirmer (bouton sticky, toujours visible)
- tapOn:
    id: "quicklog-submit-btn"

# Retour au dashboard sans erreur
- assertVisible: "Que se passe-t-il aujourd'hui ?"
- assertNotVisible: "Erreur"
