appId: com.sakapuss.mobile
---
# Onboarding Admin: wizard complet après ajout d'un premier animal
# 5 étapes : Animaux → Santé → Poids → Gamelles → Stocks

- launchApp:
    clearState: true
- waitForAnimationToEnd
- waitForAnimationToEnd
- runFlow:
    file: ../helpers/dismiss-dev-menu.yaml
    when:
      visible: "Continue"
- waitForAnimationToEnd
- assertVisible: "Se connecter"
- tapOn:
    id: "email-input"
- inputText: "playwright-e2e@test.sakapuss.local"
- tapOn:
    id: "password-input"
- inputText: "PlaywrightTest123!"
- hideKeyboard
- tapOn: "Se connecter"
- assertVisible: "Que se passe-t-il aujourd'hui ?"

# Ajouter un animal → wizard s'ouvre automatiquement
- tapOn:
    text: "+ Ajouter"
- assertVisible: "Nouvel animal"
- tapOn:
    id: "pet-name-input"
- inputText: "Lumi"
- hideKeyboard
- tapOn:
    id: "species-pill-chat"
- scrollUntilVisible:
    element:
      id: "pet-birthdate-input"
    direction: DOWN
- tapOn:
    id: "pet-birthdate-input"
- tapOn: "OK"
- scrollUntilVisible:
    element:
      text: "Ajouter"
    direction: DOWN
- tapOn: "Ajouter"

# === ÉTAPE 1 : Vos animaux ===
- assertVisible: "Vos animaux"
- assertVisible: "Étape 1 sur 5"
# Passer : l'animal vient d'être créé dans AddPetScreen
- tapOn:
    id: "onboarding-actions-skip"

# === ÉTAPE 2 : Rappels santé ===
- assertVisible: "Rappels santé"
- assertVisible: "Étape 2 sur 5"
- assertVisible:
    id: "onboarding-health-deworming"
- assertVisible:
    id: "onboarding-health-flea"
# Activer Vaccin annuel
- tapOn:
    id: "onboarding-health-vaccine"
# Passer : compte test accumule des animaux → dizaines d'API calls
- tapOn:
    id: "onboarding-actions-skip"

# === ÉTAPE 3 : Poids initial ===
- assertVisible: "Poids initial"
- assertVisible: "Étape 3 sur 5"
- tapOn:
    id: "onboarding-weight-entry"
- inputText: "4200"
- hideKeyboard
- tapOn:
    id: "onboarding-actions-save"

# === ÉTAPE 4 : Gamelles ===
- assertVisible: "Gamelles"
- assertVisible: "Étape 4 sur 5"
- tapOn:
    id: "onboarding-food-entry"
- eraseText: 10
- inputText: "Gamelle Lumi"
- hideKeyboard
- tapOn:
    id: "onboarding-actions-save"

# === ÉTAPE 5 : Stocks & produits ===
- assertVisible: "Stocks & produits"
- assertVisible: "Étape 5 sur 5"
# Passer : optionnel
- tapOn:
    id: "onboarding-actions-skip"

# → Dashboard sans erreur
- assertVisible: "Que se passe-t-il aujourd'hui ?"
- assertNotVisible: "Erreur"
- assertNotVisible: "Impossible"

# Vérifier les rappels
- tapOn: "🔔"
- assertVisible: "Rappels"
- assertNotVisible: "Impossible de charger les données"
