apiVersion: apps/v1
kind: Deployment
metadata:
  name: sakapuss-backend
  labels:
    app: sakapuss
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sakapuss
      component: backend
  template:
    metadata:
      labels:
        app: sakapuss
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/charchess/sakapuss-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: SAKAPUSS_DB_PATH
              value: /data/sakapuss.db
            - name: SAKAPUSS_MEDIA_PATH
              value: /media
          envFrom:
            - secretRef:
                name: sakapuss-secrets
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: media
              mountPath: /media
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sakapuss-data
        - name: media
          persistentVolumeClaim:
            claimName: sakapuss-media
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sakapuss-frontend
  labels:
    app: sakapuss
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sakapuss
      component: frontend
  template:
    metadata:
      labels:
        app: sakapuss
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/charchess/sakapuss-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sakapuss-backend
spec:
  selector:
    app: sakapuss
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: sakapuss-frontend
spec:
  selector:
    app: sakapuss
    component: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sakapuss-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sakapuss-media
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sakapuss
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: sakapuss.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sakapuss-backend
                port:
                  number: 8000
          - path: /media
            pathType: Prefix
            backend:
              service:
                name: sakapuss-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sakapuss-frontend
                port:
                  number: 80
